<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Przykładowe Menu</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
        }

        nav {
            background-color: #333;
        }

        ul.menu {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
        }

        ul.menu > li {
            position: relative;
        }

        ul.menu > li > a {
            display: block;
            color: white;
            padding: 15px 20px;
            text-decoration: none;
        }

        ul.menu > li > a:hover {
            background-color: #555;
        }

        .submenu {
            display: none;
            position: absolute;
            background-color: #444;
            min-width: 180px;
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .submenu li a {
            display: block;
            color: white;
            padding: 10px 15px;
            text-decoration: none;
        }

        .submenu li a:hover {
            background-color: #666;
        }

        ul.menu li:hover .submenu {
            display: block;
        }
    </style>
</head>
<body>

<nav>
    <ul class="menu">
        <li><a href="#">Strona główna</a></li>

        <li>
            <a href="#">Produkty</a>
            <ul class="submenu">
                <li><a href="#">Laptopy</a></li>
                <li><a href="#">Monitory</a></li>
                <li><a href="#">Akcesoria</a></li>
            </ul>
        </li>

        <li>
            <a href="#">Usługi</a>
            <ul class="submenu">
                <li><a href="#">Serwis</a></li>
                <li><a href="#">Szkolenia</a></li>
            </ul>
        </li>

        <li><a href="#">Kontakt</a></li>
    </ul>
</nav>

</body>
</html>
